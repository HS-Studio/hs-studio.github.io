
<style>
  :root {
    --font-color: light-dark(#1a1a18, #f5f4ee);
    --bg-color: light-dark(#f5f4ee, #1a1a18);
  }

  body {
    background-color: var(--bg-color);
  }

  .ctrl {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    font-size: 12px;
    color: var(--font-color);
  }

  .ctrl label {
    width: 90px;
    text-align: right;
    flex-shrink: 0;
  }

  .ctrl span {
    width: 34px;
    text-align: right;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  input[type=range] {
    flex: 1;
  }

  .section {
    font-size: 11px;
    font-weight: 500;
    color: var(--font-color);
    margin: 10px 0 2px 98px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
</style>

<meta name="color-scheme" content="light dark">

<div style="display:inline-block;padding:4px 12px 12px;">
  <canvas id="cv" width="324" style="width:100%;display:block;"></canvas>
  <div style="display:block; position: relative; left: -25px;">
    <div>
      <div class="section">Oben</div>
      <div class="ctrl"><label>openness</label><input type="range" min="0" max="1" step="0.01" value="1.0" id="to"><span id="tos">1.0</span></div>
      <div class="ctrl"><label>tilt</label><input type="range" min="-0.5" max="0.5" step="0.01" value="0.0" id="tt"><span id="tts">0.0</span></div>
      <div class="ctrl"><label>curvature</label><input type="range" min="-1" max="1" step="0.01" value="0.0" id="tc"><span id="tcs">0.0</span></div>
      <div class="ctrl"><label>roundness</label><input type="range" min="0" max="1" step="0.01" value="0.5" id="tr"><span id="trs">0.50</span></div>
    </div>
    <div>
      <div class="section">Unten</div>
      <div class="ctrl"><label>openness</label><input type="range" min="0" max="1" step="0.01" value="1.0" id="bo"><span id="bos">1.0</span></div>
      <div class="ctrl"><label>tilt</label><input type="range" min="-0.5" max="0.5" step="0.01" value="0.0" id="bt"><span id="bts">0.0</span></div>
      <div class="ctrl"><label>curvature</label><input type="range" min="-1" max="1" step="0.01" value="0.0" id="bc"><span id="bcs">0.0</span></div>
      <div class="ctrl"><label>roundness</label><input type="range" min="0" max="1" step="0.01" value="0.5" id="br"><span id="brs">0.50</span></div>
      <div class="ctrl"><label>debug</label><input type="checkbox" id="dbg"></div>
    </div>
  </div>
</div>

<script>
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  function getParams() {
    const g = id => parseFloat(document.getElementById(id).value);
    return {
      top: { openness: g('to'), tilt: g('tt'), curvature: g('tc'), roundness: g('tr') },
      bottom: { openness: g('bo'), tilt: g('bt'), curvature: g('bc'), roundness: g('br') }
    };
  }

  function buildEyePoints(cx, cy, W, H, top, bottom) {
    const hw = W * 0.5, hh = H * 0.5;

    const topOpen = hh * top.openness;
    const botOpen = hh * bottom.openness;

    const TL = { x: cx - hw, y: cy - topOpen + top.tilt * H };
    const TR = { x: cx + hw, y: cy - topOpen - top.tilt * H };
    const BL = { x: cx - hw, y: cy + botOpen + bottom.tilt * H };
    const BR = { x: cx + hw, y: cy + botOpen - bottom.tilt * H };

    const rx_T = hw * top.roundness;
    const rx_B = hh * bottom.roundness;
    const ry_TL = hh * top.roundness;
    const ry_TR = hh * top.roundness;
    const ry_BL = hh * bottom.roundness;
    const ry_BR = hh * bottom.roundness;

    const pts = [];
    const ARC_STEPS = 6;

    function arcPts(cornerX, cornerY, signX, signY, rx, ry) {
      for (let i = 0; i <= ARC_STEPS; i++) {
        const t = (i / ARC_STEPS) * Math.PI * 0.5;
        const x = cornerX + signX * rx * (1 - Math.cos(t));
        const y = cornerY + signY * ry * (1 - Math.sin(t));
        pts.push({ x, y });
      }
    }

    const CURVE_STEPS = 12;

    function edgePts(x0, y0, x1, y1, bow) {
      const mx = (x0 + x1) * 0.5, my = (y0 + y1) * 0.5;
      const perpY = -(x1 - x0);
      const perpX = (y1 - y0);
      const len = Math.sqrt(perpX * perpX + perpY * perpY);
      const maxBow = H * 0.5;
      for (let i = 0; i <= CURVE_STEPS; i++) {
        const t = i / CURVE_STEPS;
        const b = 4 * t * (1 - t) * bow * maxBow;
        const ix = x0 + (x1 - x0) * t + (perpX / len) * b;
        const iy = y0 + (y1 - y0) * t + (perpY / len) * b;
        pts.push({ x: ix, y: iy });
      }
    }

    arcPts(TL.x, TL.y, 1, 1, rx_T, ry_TL);
    edgePts(TL.x + rx_T, TL.y, TR.x - rx_T, TR.y, -top.curvature);
    arcPts(TR.x, TR.y, -1, 1, rx_T, ry_TR);
    pts.push({ x: TR.x, y: (TR.y + ry_TR) });
    pts.push({ x: BR.x, y: (BR.y - ry_BR) });
    arcPts(BR.x, BR.y, -1, -1, rx_B, ry_BR);
    edgePts(BR.x - rx_B, BR.y, BL.x + rx_B, BL.y, bottom.curvature);
    arcPts(BL.x, BL.y, 1, -1, rx_B, ry_BL);
    pts.push({ x: BL.x, y: BL.y - ry_BL });
    pts.push({ x: TL.x, y: TL.y + ry_TL });

    return pts;
  }

  function draw() {
    const p = getParams();
    const debug = document.getElementById('dbg').checked;
    const dpr = window.devicePixelRatio || 1;
    cv.width = 324 * dpr;
    cv.height = 260 * dpr;
    cv.style.width = '324px';
    cv.style.height = '260px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    ctx.clearRect(0, 0, 324, 260);

    const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
    const bg = isDark ? '#1a1a18' : '#f5f4ee';
    const eyeCol = '#17f2f6';
    const dotCol = isDark ? '#4a9eff' : '#2277dd';

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 324, 260);

    const eyes = [
      { cx: 162, cy: 130, W: 200, H: 200 },
    ];

    eyes.forEach(e => {
      const pts = buildEyePoints(e.cx, e.cy, e.W, e.H, p.top, p.bottom);

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.closePath();
      ctx.fillStyle = eyeCol;
      ctx.fill();

      if (debug) {
        ctx.fillStyle = dotCol;
        pts.forEach(pt => {
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 2, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    });
  }

  function bind(ids) {
    ids.forEach(([slider, display]) => {
      const s = document.getElementById(slider);
      const d = document.getElementById(display);
      s.addEventListener('input', () => {
        d.textContent = parseFloat(s.value).toFixed(2);
        draw();
      });
    });
  }

  bind([['to', 'tos'], ['tt', 'tts'], ['tc', 'tcs'], ['tr', 'trs'], ['bo', 'bos'], ['bt', 'bts'], ['bc', 'bcs'], ['br', 'brs']]);

  document.getElementById('dbg').addEventListener('change', draw);

  draw();
  matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
  window.addEventListener('resize', draw);
</script>
