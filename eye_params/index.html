<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="../style.css">
  <title>Eye Parameters</title>
  <style>
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      background-color: var(--card-bg);
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-left: 4px;
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }

    .ctrl label {
      width: 80px;
      text-align: right;
      flex-shrink: 0;
      font-size: 14px;
    }

    .ctrl span {
      width: 40px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #17f2f6;
    }

    @media (min-width: 600px) {
      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      canvas {
        max-height: 400px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <canvas id="cv"></canvas>
    <div class="controls">
      <div>
        <div class="section">Oben</div>
        <div class="ctrl">
          <label>openness</label>
          <input type="range" min="0" max="1" step="0.01" value="1.0" id="to">
          <span id="tos">1.0</span>
        </div>
        <div class="ctrl">
          <label>curvature</label>
          <input type="range" min="-1" max="1" step="0.01" value="0.0" id="tc">
          <span id="tcs">0.0</span>
        </div>
        <div class="ctrl">
          <label>tilt</label>
          <input type="range" min="-0.5" max="0.5" step="0.01" value="0.0" id="tt">
          <span id="tts">0.0</span>
        </div>
        <div class="ctrl">
          <label>roundness</label>
          <input type="range" min="0" max="1" step="0.01" value="0.5" id="tr">
          <span id="trs">0.50</span>
        </div>
      </div>

      <div>
        <div class="section">Unten</div>
        <div class="ctrl">
          <label>openness</label>
          <input type="range" min="0" max="1" step="0.01" value="1.0" id="bo">
          <span id="bos">1.0</span>
        </div>
        <div class="ctrl">
          <label>curvature</label>
          <input type="range" min="-1" max="1" step="0.01" value="0.0" id="bc">
          <span id="bcs">0.0</span>
        </div>
        <div class="ctrl">
          <label>tilt</label>
          <input type="range" min="-0.5" max="0.5" step="0.01" value="0.0" id="bt">
          <span id="bts">0.0</span>
        </div>
        <div class="ctrl">
          <label>roundness</label>
          <input type="range" min="0" max="1" step="0.01" value="0.5" id="br">
          <span id="brs">0.50</span>
        </div>
        <div class="ctrl">
          <label>debug</label>
          <input type="checkbox" id="dbg">
        </div>
      </div>
    </div>
  </div>

  <script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');

    // Set initial canvas size (will be updated in draw())
    function initCanvas() {
      const container = cv.parentElement;
      const width = container.clientWidth - 32; // Account for padding
      const height = width * 0.8; // Aspect ratio 4:5 (similar to original 324:260)
      cv.width = width * window.devicePixelRatio;
      cv.height = height * window.devicePixelRatio;
      cv.style.width = `${width}px`;
      cv.style.height = `${height}px`;
    }

    function getParams() {
      const g = id => parseFloat(document.getElementById(id).value);
      return {
        top: { openness: g('to'), tilt: g('tt'), curvature: g('tc'), roundness: g('tr') },
        bottom: { openness: g('bo'), tilt: g('bt'), curvature: g('bc'), roundness: g('br') }
      };
    }

    function buildEyePoints(cx, cy, W, H, top, bottom) {
      const hw = W * 0.5, hh = H * 0.5;
      const topOpen = hh * top.openness;
      const botOpen = hh * bottom.openness;

      const TL = { x: cx - hw, y: cy - topOpen + top.tilt * H };
      const TR = { x: cx + hw, y: cy - topOpen - top.tilt * H };
      const BL = { x: cx - hw, y: cy + botOpen + bottom.tilt * H };
      const BR = { x: cx + hw, y: cy + botOpen - bottom.tilt * H };

      const midY_L = (TL.y + BL.y) * 0.5;
      const midY_R = (TR.y + BR.y) * 0.5;

      const rx_T = hw * top.roundness;
      const rx_B = hh * bottom.roundness;
      const ry_TL = hh * top.roundness;
      const ry_TR = hh * top.roundness;
      const ry_BL = hh * bottom.roundness;
      const ry_BR = hh * bottom.roundness;

      const pts = [];
      const ARC_STEPS = 6;

      function arcPts(cornerX, cornerY, signX, signY, rx, ry) {
        for (let i = 0; i <= ARC_STEPS; i++) {
          const t = (i / ARC_STEPS) * Math.PI * 0.5;
          const x = cornerX + signX * rx * (1 - Math.cos(t));
          const y = cornerY + signY * ry * (1 - Math.sin(t));
          pts.push({ x, y });
        }
      }

      const CURVE_STEPS = 12;
      function edgePts(x0, y0, x1, y1, bow) {
        const mx = (x0 + x1) * 0.5, my = (y0 + y1) * 0.5;
        const perpY = -(x1 - x0);
        const perpX = (y1 - y0);
        const len = Math.sqrt(perpX * perpX + perpY * perpY);
        const maxBow = H * 0.5;
        for (let i = 0; i <= CURVE_STEPS; i++) {
          const t = i / CURVE_STEPS;
          const b = 4 * t * (1 - t) * bow * maxBow;
          const ix = x0 + (x1 - x0) * t + (perpX / len) * b;
          const iy = y0 + (y1 - y0) * t + (perpY / len) * b;
          pts.push({ x: ix, y: iy });
        }
      }

      arcPts(TL.x, TL.y, 1, 1, rx_T, ry_TL);
      edgePts(TL.x + rx_T, TL.y, TR.x - rx_T, TR.y, -top.curvature);
      arcPts(TR.x, TR.y, -1, 1, rx_T, ry_TR);
      pts.push({ x: TR.x, y: (TR.y + ry_TR) });
      pts.push({ x: BR.x, y: (BR.y - ry_BR) });
      arcPts(BR.x, BR.y, -1, -1, rx_B, ry_BR);
      edgePts(BR.x - rx_B, BR.y, BL.x + rx_B, BL.y, bottom.curvature);
      arcPts(BL.x, BL.y, 1, -1, rx_B, ry_BL);
      pts.push({ x: BL.x, y: BL.y - ry_BL });
      pts.push({ x: TL.x, y: TL.y + ry_TL });

      return pts;
    }

    function draw() {
      const p = getParams();
      const debug = document.getElementById('dbg').checked;
      const dpr = window.devicePixelRatio || 1;

      // Update canvas size
      initCanvas();

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const width = cv.width / dpr;
      const height = cv.height / dpr;

      ctx.clearRect(0, 0, width, height);

      const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
      /* const bg = isDark ? '#1a1a18' : '#f5f4ee'; */
      const bg = '#1a1a18'
      const eyeCol = isDark ? '#17f2f6' : '#17f2f6';
      const dotCol = isDark ? '#4a9eff' : '#2277dd';
      const gridCol = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      // Center the eye in the canvas
      const eyeSize = Math.min(width, height) * 0.8;
      const eyes = [{ cx: width / 2, cy: height / 2, W: eyeSize, H: eyeSize }];

      eyes.forEach(e => {
        const pts = buildEyePoints(e.cx, e.cy, e.W, e.H, p.top, p.bottom);

        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.closePath();
        ctx.fillStyle = eyeCol;
        ctx.fill();

        if (debug) {
          ctx.fillStyle = dotCol;
          pts.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 2 * dpr, 0, Math.PI * 2);
            ctx.fill();
          });
        }
      });
    }

    function bind(ids) {
      ids.forEach(([slider, display]) => {
        const s = document.getElementById(slider);
        const d = document.getElementById(display);
        s.addEventListener('input', () => {
          d.textContent = parseFloat(s.value).toFixed(2);
          draw();
        });
      });
    }

    bind([['to', 'tos'], ['tt', 'tts'], ['tc', 'tcs'], ['tr', 'trs'],
    ['bo', 'bos'], ['bt', 'bts'], ['bc', 'bcs'], ['br', 'brs']]);

    document.getElementById('dbg').addEventListener('change', draw);

    // Initial draw and event listeners
    initCanvas();
    draw();
    matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);
    window.addEventListener('resize', () => {
      // Debounce resize events
      clearTimeout(window.resizeTimer);
      window.resizeTimer = setTimeout(draw, 200);
    });
  </script>
</body>

</html>
