<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="../icons/sdf.webp" />
    <style>
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: var(--bg-color);
        }
    </style>
    <title>Projekte</title>
</head>

<body>
    <canvas id="particleCanvas"></canvas>
    <header>
        <h1>Projekte</h1>
    </header>
    <div class="card-container">
        <a href="sdf_playground/" class="project-card">
            <img src="../icons/sdf.webp" alt="Icon">
            <h2>SDF Playground</h2>
            <p>Experimentierfeld für Signed Distance Functions</p>
        </a>

        <a href="snake/" class="project-card">
            <img src="../icons/snake.webp" alt="Icon">
            <h2>Snake</h2>
            <p>A Snake Game</p>
        </a>

        <a href="tft_colorpicker/" class="project-card">
            <img src="../icons/tft.webp" alt="Icon">
            <h2>TFT Color Picker</h2>
            <p>Farbauswahl für TFT-Displays</p>
        </a>

        <a href="eye_params/" class="project-card">
            <img src="../icons/eye.webp" alt="Icon">
            <h2>Eye Parameters</h2>
            <p>Tool zur Anpassung von Augenparametern</p>
        </a>

        <a href="llmlist/" class="project-card">
            <img src="https://www.google.com/s2/favicons?sz=32&domain=chatgpt.com" alt="Icon">
            <h2>LLM List</h2>
            <p>Alle LLMs in einer Liste</p>
        </a>
    </div>

    <footer>
        <p></p>
    </footer>
    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particleColor = '';
        let lineColor = '';

        let particles = [];
        let particleCount = 80; // Anzahl der Partikel (höher = rechenintensiver)
        let connectionDistance = 128; // Max. Distanz für Linien

        function onMobile() {
            if (window.matchMedia("(max-width: 1024px)").matches) {
                particleCount = 30; // Weniger Partikel auf Mobilgeräten
                /* connectionDistance = 64; */
            }
        }

        onMobile();

        // Canvas an Fenstergröße anpassen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            onMobile();
        }

        window.addEventListener('resize', resize);
        resize();

        function updateColor() {
            particleColor = getComputedStyle(document.body).getPropertyValue('--particle-color').trim();
        }

        updateColor();

        const colorSchemeMQL = window.matchMedia('(prefers-color-scheme: dark)');
        colorSchemeMQL.addEventListener('change', updateColor);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5; // Geschwindigkeit X
                this.vy = (Math.random() - 0.5) * 0.5; // Geschwindigkeit Y
                this.size = Math.random() * 2 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Wenn Partikel Rand verlässt, auf der anderen Seite wieder rein
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = particleColor;
                ctx.fill();
            }
        }

        // Initialisierung
        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();

                // Linien zwischen Partikeln zeichnen
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        ctx.beginPath();
                        /* ctx.strokeStyle = `rgba(255, 255, 255, ${1 - distance / connectionDistance})`; */
                        ctx.strokeStyle = particleColor;
                        ctx.globalAlpha = (1 - distance / connectionDistance);
                        particleColor[3] = `${1 - distance / connectionDistance})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1.0;
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>

</html>
