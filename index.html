<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekte</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f5f5f5;
            --card-border: #e0e0e0;
            --hover-bg: #e8e8e8;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --card-bg: #1e1e1e;
                --card-border: #333333;
                --hover-bg: #2d2d2d;
                --shadow: rgba(0, 0, 0, 0.3);
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .subtitle {
            color: var(--text-color);
            opacity: 0.8;
            font-size: 1.1rem;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px var(--shadow);
            background-color: var(--hover-bg);
        }

        .project-card h2 {
            margin: 0 0 0.5rem;
            font-size: 1.5rem;
        }

        .project-card p {
            margin: 0;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .projects {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Projekte</h1>
    </header>

    <div class="projects">
        <a href="sdf_playground/" class="project-card">
            <h2>SDF Playground</h2>
            <p>Experimentierfeld für Signed Distance Functions</p>
        </a>

        <a href="eye_params/" class="project-card">
            <h2>Eye Parameters</h2>
            <p>Tool zur Anpassung von Augenparametern</p>
        </a>

        <a href="tft_colorpicker/" class="project-card">
            <h2>TFT Color Picker</h2>
            <p>Farbauswahl für TFT-Displays</p>
        </a>
    </div>

    <footer>
        <p>© 2026 Heiko Schulz</p>
    </footer>
</body>
</html>
